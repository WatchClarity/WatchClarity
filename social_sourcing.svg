<svg viewBox="0 0 480 520" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <style>
      .sans { font-family: 'Arial', sans-serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="480" height="520" fill="#003d1a"/>

  <!-- Top green bar -->
  <rect width="480" height="6" fill="#6dcc9a"/>

  <!-- Card border -->
  <rect x="1" y="1" width="478" height="518" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>

  <!-- Tag line -->
  <rect x="32" y="36" width="3" height="18" fill="#6dcc9a"/>
  <text x="44" y="50" class="sans" font-size="10" font-weight="600" fill="#6dcc9a" letter-spacing="2">WATCH CLARITY SOURCING</text>

  <!-- Title -->
  <text x="32" y="96" font-size="28" font-weight="700" fill="#ffffff">Find your</text>
  <text x="32" y="130" font-size="28" font-weight="700" fill="#ffffff">perfect watch.</text>

  <!-- Divider -->
  <line x1="32" y1="152" x2="448" y2="152" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>

  <!-- Step 1 -->
  <circle cx="50" cy="190" r="18" fill="rgba(109,204,154,0.15)" stroke="#6dcc9a" stroke-width="1"/>
  <text x="50" y="196" text-anchor="middle" class="sans" font-size="13" font-weight="700" fill="#6dcc9a">1</text>
  <text x="82" y="184" class="sans" font-size="13" font-weight="700" fill="#ffffff">Tell us what you're looking for</text>
  <text x="82" y="201" class="sans" font-size="11" fill="rgba(255,255,255,0.5)">Brand, model, budget &amp; condition</text>

  <!-- Connector -->
  <line x1="50" y1="210" x2="50" y2="232" stroke="rgba(109,204,154,0.3)" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Step 2 -->
  <circle cx="50" cy="250" r="18" fill="rgba(109,204,154,0.15)" stroke="#6dcc9a" stroke-width="1"/>
  <text x="50" y="256" text-anchor="middle" class="sans" font-size="13" font-weight="700" fill="#6dcc9a">2</text>
  <text x="82" y="244" class="sans" font-size="13" font-weight="700" fill="#ffffff">We search trusted platforms</text>
  <text x="82" y="261" class="sans" font-size="11" fill="rgba(255,255,255,0.5)">eBay, Chrono24, Watchfinder, Subdial &amp; more</text>

  <!-- Connector -->
  <line x1="50" y1="270" x2="50" y2="292" stroke="rgba(109,204,154,0.3)" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Step 3 -->
  <circle cx="50" cy="310" r="18" fill="rgba(109,204,154,0.15)" stroke="#6dcc9a" stroke-width="1"/>
  <text x="50" y="316" text-anchor="middle" class="sans" font-size="13" font-weight="700" fill="#6dcc9a">3</text>
  <text x="82" y="304" class="sans" font-size="13" font-weight="700" fill="#ffffff">Receive a vetted shortlist</text>
  <text x="82" y="321" class="sans" font-size="11" fill="rgba(255,255,255,0.5)">3–5 genuine options with honest assessments</text>

  <!-- Connector -->
  <line x1="50" y1="330" x2="50" y2="352" stroke="rgba(109,204,154,0.3)" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Step 4 -->
  <circle cx="50" cy="370" r="18" fill="#008037" stroke="#6dcc9a" stroke-width="1"/>
  <text x="50" y="376" text-anchor="middle" class="sans" font-size="13" font-weight="700" fill="#ffffff">4</text>
  <text x="82" y="364" class="sans" font-size="13" font-weight="700" fill="#ffffff">Buy with confidence</text>
  <text x="82" y="381" class="sans" font-size="11" fill="rgba(255,255,255,0.5)">No stress. No wasted time. No overpaying.</text>

  <!-- Bottom pill -->
  <rect x="32" y="414" width="416" height="68" rx="4" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="240" y="440" text-anchor="middle" class="sans" font-size="11" fill="rgba(255,255,255,0.5)" letter-spacing="1">IN YOUR INBOX WITHIN</text>
  <text x="240" y="465" text-anchor="middle" font-size="20" font-weight="700" fill="#6dcc9a">24 hours</text>

  <!-- Price badge -->
  <rect x="382" y="28" width="70" height="32" rx="2" fill="#6dcc9a"/>
  <text x="417" y="49" text-anchor="middle" class="sans" font-size="15" font-weight="700" fill="#003d1a">£25</text>
</svg>
